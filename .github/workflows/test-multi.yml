name: Test (Multi-Version)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: openqueue
          POSTGRES_USER: openqueue
          POSTGRES_PASSWORD: openqueue_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openqueue -d openqueue"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30

    env:
      DATABASE_URL: postgresql://openqueue:openqueue_password@127.0.0.1:5432/openqueue
      OPENQUEUE_ENV: test
      OPENQUEUE_TOKEN_HMAC_SECRET: openqueue-test-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: htmlcov/
