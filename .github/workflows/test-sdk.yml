name: Test SDK

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/**'

jobs:
  test-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SDK dependencies
        working-directory: sdk/python
        run: |
          pip install -e ".[dev]"

      - name: Run SDK tests
        working-directory: sdk/python
        run: pytest -q

      - name: Lint SDK
        working-directory: sdk/python
        run: |
          ruff check .
          ruff format --check .
