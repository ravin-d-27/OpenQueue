# Alembic configuration for OpenQueue
#
# NOTE:
# - We intentionally do NOT hardcode the database URL here.
# - The URL is loaded from the environment variable DATABASE_URL
#   (typically via your app/.env and python-dotenv).
#
# Usage examples:
#   alembic -c OpenQueue/alembic.ini upgrade head
#   alembic -c OpenQueue/alembic.ini revision -m "add foo"
#
# If you're running from the OpenQueue project root, you can also just:
#   alembic upgrade head
# as long as this file is at OpenQueue/alembic.ini.

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration files (optional)
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Ensure Alembic uses the correct timezone and formatting for timestamps
timezone = UTC

# When using multiple version directories (not used yet)
# version_locations = %(here)s/migrations/versions

# The database URL is injected at runtime from env via env.py.
# Leave this placeholder as-is.
sqlalchemy.url =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%dT%H:%M:%S%z
