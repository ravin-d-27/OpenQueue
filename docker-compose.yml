services:
  db:
    image: postgres:16
    container_name: openqueue-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: openqueue
      POSTGRES_USER: openqueue
      POSTGRES_PASSWORD: openqueue_password
    ports:
      - "5432:5432"
    volumes:
      - openqueue_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openqueue -d openqueue"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openqueue-api
    restart: unless-stopped
    environment:
      PYTHONPATH: .
      DATABASE_URL: postgresql://openqueue:openqueue_password@db:5432/openqueue
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command:
      [
        "sh",
        "-c",
        "PYTHONPATH=. alembic upgrade head && PYTHONPATH=. uvicorn app.fastapi_app:app --host 0.0.0.0 --port 8000",
      ]

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: openqueue-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  openqueue_pgdata:
